version: '3.8'

services:
  # 1. PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: trustnet_postgres
    restart: always
    environment:
      POSTGRES_DB: trustnet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trustnet"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Neo4j Graph Database Service
  neo4j:
    image: neo4j:5.18-community
    container_name: trustnet_neo4j
    restart: always
    ports:
      - "7474:7474" # HTTP Dashboard
      - "7687:7687" # Bolt connector
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc", "gds"]' # Include Graph Data Science plugins
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5

  # 3. FastAPI Backend Service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: trustnet_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/trustnet
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  # 4. React Vite Frontend Client
  frontend:
    build:
      context: ./frontend
    container_name: trustnet_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  neo4j_data:
  neo4j_logs:
